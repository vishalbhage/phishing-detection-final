<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>

    <!-- Link External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Phishing Detector</h1>
        <p>Enter a URL to check if it’s safe</p>
    </div>

    <form method="post">
        <div class="url-box">
            <input type="text" name="url" placeholder="e.g. https://example.com/login" required>
        </div>

        <div class="actions">
            <button type="submit" class="check-btn">Check URL</button>
            <button type="reset" class="clear-btn">Clear</button>
        </div>
    </form>

   {% if prediction %}
<div class="result-box">
    <h3>Status</h3>

    <div class="result {% if prediction == 'Legitimate Website' %}legitimate{% else %}phishing{% endif %}">
        {{ prediction }}
    </div>

    {% if confidence %}
    <p class="confidence">
        Confidence: <strong>{{ confidence }}%</strong>
    </p>
    {% endif %}
</div>
{% endif %}

    <div class="history">
        <h4>Recent Searches</h4>
        {% for h in history %}
            <div class="history-item">{{ h[0] }} — {{ h[1] }}</div>
        {% endfor %}
    </div>
</div>

</body>
</html>
